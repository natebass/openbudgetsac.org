name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Static Site (Pages, non-Docker)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: _src
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: _src/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: PUPPETEER_SKIP_DOWNLOAD=true npm ci --include=dev

      - name: i18n unit smoke tests (site + compare)
        run: npx jest --config jest.config.cjs --selectProjects unit --runTestsByPath js/compare/__tests__/i18n.test.js js/compare/__tests__/siteI18n.test.js --runInBand

      - name: Build frontend bundle
        run: npm run build

      - name: Build CSS
        run: npm run build-css

      - name: Generate JSDoc docs
        run: npm run docs:jsdoc

      - name: Build site with Eleventy
        run: npx @11ty/eleventy

      - name: Verify i18n assets in built site
        run: |
          test -f build/js/i18n-site.js
          grep -R -nE "data-locale-selector|js/i18n-site.js" --include="*.html" build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
